# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host:     <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV["DB_USERNAME"] %>
  password: <%= ENV["DB_PASSWORD"] %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "marcopolo_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "marcopolo_test") %>

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV["DB_NAME"] %>
  cache:
    <<: *primary_production
    database: marcopolo_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: marcopolo_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: marcopolo_production_cable
    migrations_paths: db/cable_migrate
